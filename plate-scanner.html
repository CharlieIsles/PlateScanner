<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plate Scanner 2</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --ink: #1a1a18;
      --mid: #8a8578;
      --rule: #d8d2c5;
      --plate-yellow: #f5c800;
      --plate-white: #f8f8f6;
      --confirm: #2a7a3b;
      --confirm-bg: #e8f5eb;
      --warn: #b84a00;
      --scan-line: rgba(245, 200, 0, 0.6);
      --mono: 'DM Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 48px;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    .page-header {
      width: 100%;
      max-width: 480px;
      margin-bottom: 28px;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 12px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .page-title {
      font-family: var(--display);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--ink);
    }

    .page-sub {
      font-size: 10px;
      color: var(--mid);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: white;
      border: 1.5px solid var(--ink);
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 4px 4px 0 var(--ink);
      margin-bottom: 16px;
    }

    .card-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
    }

    .card-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
    }

    /* Viewfinder */
    .viewfinder-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #111;
      overflow: hidden;
    }

    #videoEl {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Crop overlay - shows the region being OCR'd */
    .crop-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Dark mask outside crop zone */
    .mask-top,
    .mask-bottom,
    .mask-left,
    .mask-right {
      position: absolute;
      background: rgba(0, 0, 0, 0.45);
    }

    .mask-top {
      top: 0;
      left: 0;
      right: 0;
      height: 35%;
    }

    .mask-bottom {
      bottom: 0;
      left: 0;
      right: 0;
      height: 35%;
    }

    .mask-left {
      top: 35%;
      bottom: 35%;
      left: 0;
      width: 8%;
    }

    .mask-right {
      top: 35%;
      bottom: 35%;
      right: 0;
      width: 8%;
    }

    /* Corner brackets */
    .bracket {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--plate-yellow);
      border-style: solid;
    }

    .bracket.tl {
      top: calc(35% - 1px);
      left: calc(8% - 1px);
      border-width: 2px 0 0 2px;
    }

    .bracket.tr {
      top: calc(35% - 1px);
      right: calc(8% - 1px);
      border-width: 2px 2px 0 0;
    }

    .bracket.bl {
      bottom: calc(35% - 1px);
      left: calc(8% - 1px);
      border-width: 0 0 2px 2px;
    }

    .bracket.br {
      bottom: calc(35% - 1px);
      right: calc(8% - 1px);
      border-width: 0 2px 2px 0;
    }

    /* Scan line animation */
    .scan-line {
      position: absolute;
      left: 8%;
      right: 8%;
      height: 2px;
      background: var(--scan-line);
      box-shadow: 0 0 8px var(--plate-yellow);
      top: 35%;
      animation: scan 2s ease-in-out infinite;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .scan-line.active {
      opacity: 1;
    }

    @keyframes scan {
      0% {
        top: 35%;
      }

      50% {
        top: 65%;
      }

      100% {
        top: 35%;
      }
    }

    /* Confirmed flash */
    .confirm-flash {
      position: absolute;
      inset: 0;
      background: rgba(42, 122, 59, 0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }

    .confirm-flash.show {
      opacity: 1;
    }

    /* Idle overlay */
    .idle-overlay {
      position: absolute;
      inset: 0;
      background: #1a1a18;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: opacity 0.4s;
    }

    .idle-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .idle-icon {
      font-size: 36px;
      opacity: 0.4;
    }

    .idle-text {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Canvas (hidden, used for OCR) */
    #canvasEl {
      display: none;
    }

    /* Result display */
    .result-area {
      padding: 20px 20px 16px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .plate-display {
      font-family: var(--display);
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 4px;
      color: var(--ink);
      background: var(--plate-white);
      border: 2px solid var(--ink);
      border-radius: 4px;
      padding: 8px 20px;
      min-width: 240px;
      text-align: center;
      position: relative;
      transition: all 0.2s;
      box-shadow: 2px 2px 0 var(--ink);
    }

    .plate-display.confirmed {
      background: var(--confirm-bg);
      border-color: var(--confirm);
      color: var(--confirm);
      box-shadow: 2px 2px 0 var(--confirm);
    }

    .plate-display.candidate {
      background: #fffbe6;
      border-color: #b8960a;
      color: #7a6200;
      box-shadow: 2px 2px 0 #b8960a;
    }

    .plate-placeholder {
      font-size: 28px;
      letter-spacing: 6px;
      color: var(--rule);
    }

    .result-status {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
      min-height: 14px;
    }

    .result-status.confirmed {
      color: var(--confirm);
    }

    .result-status.scanning {
      color: #b8960a;
    }

    /* Controls */
    .controls {
      padding: 14px 16px;
      border-top: 1px solid var(--rule);
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 11px 8px;
      border: 1.5px solid var(--ink);
      border-radius: 2px;
      background: transparent;
      color: var(--ink);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.12s;
      box-shadow: 2px 2px 0 var(--ink);
    }

    button:hover:not(:disabled) {
      background: var(--ink);
      color: var(--bg);
    }

    button:active:not(:disabled) {
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    button.primary {
      background: var(--ink);
      color: var(--bg);
    }

    button.primary:hover:not(:disabled) {
      background: #3a3a36;
    }

    button:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Status bar */
    .status-bar {
      padding: 8px 16px;
      border-top: 1px solid var(--rule);
      background: var(--bg);
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--rule);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.ready {
      background: var(--confirm);
      box-shadow: 0 0 6px var(--confirm);
    }

    .status-dot.working {
      background: var(--plate-yellow);
      animation: blink 0.8s infinite;
    }

    .status-dot.error {
      background: var(--warn);
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    .status-text {
      font-size: 10px;
      color: var(--mid);
      letter-spacing: 0.05em;
      flex: 1;
    }

    /* Log */
    .log-entries {
      max-height: 160px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .log-entry {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 9px 16px;
      border-bottom: 1px solid var(--rule);
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-6px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .log-plate {
      font-family: var(--display);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 2px;
      color: var(--ink);
    }

    .log-time {
      font-size: 9px;
      color: var(--mid);
      letter-spacing: 0.1em;
    }

    .log-empty {
      padding: 20px 16px;
      font-size: 10px;
      color: var(--mid);
      text-align: center;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .log-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
    }

    .log-count {
      font-size: 9px;
      color: var(--mid);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .btn-small {
      font-size: 9px;
      padding: 4px 10px;
      flex: unset;
      box-shadow: 1px 1px 0 var(--ink);
    }
  </style>
</head>

<body>

  <div class="page-header">
    <span class="page-title">Plate Scanner</span>
    <span class="page-sub">UK · Live OCR</span>
  </div>

  <canvas id="canvasEl" width="320" height="120"></canvas>

  <div class="card">
    <div class="card-header">
      <span class="card-label">Viewfinder</span>
      <span class="card-label" id="fpsLabel">—</span>
    </div>

    <div class="viewfinder-wrap">
      <video id="videoEl" autoplay playsinline muted></video>

      <div class="crop-overlay">
        <div class="mask-top"></div>
        <div class="mask-bottom"></div>
        <div class="mask-left"></div>
        <div class="mask-right"></div>
        <div class="bracket tl"></div>
        <div class="bracket tr"></div>
        <div class="bracket bl"></div>
        <div class="bracket br"></div>
        <div class="scan-line" id="scanLine"></div>
        <div class="confirm-flash" id="confirmFlash"></div>
      </div>

      <div class="idle-overlay" id="idleOverlay">
        <div class="idle-icon">⬡</div>
        <div class="idle-text">Camera inactive</div>
      </div>
    </div>

    <div class="result-area">
      <div class="plate-display" id="plateDisplay">
        <span class="plate-placeholder">AB12 ABC</span>
      </div>
      <div class="result-status" id="resultStatus">Waiting for camera</div>
    </div>

    <div class="controls">
      <button class="primary" id="startBtn" onclick="startScanner()">Start Camera</button>
      <button id="logBtn" onclick="logPlate()" disabled>Log Plate</button>
      <button id="resetBtn" onclick="resetResult()" disabled>Reset</button>
      <button id="stopBtn" onclick="stopScanner()" disabled>Stop</button>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Press Start Camera to begin.</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-label">Captured Plates</span>
    </div>
    <div class="log-entries" id="logEntries">
      <div class="log-empty">No plates logged yet</div>
    </div>
    <div class="log-footer">
      <span class="log-count" id="logCount">0 entries</span>
      <button class="btn-small" onclick="clearLog()">Clear</button>
    </div>
  </div>

  <script>
    // ── UK plate regex ──────────────────────────────────────────────────────────
    // Covers: current (AB12 ABC), prefix (A123 ABC), suffix (ABC 123A), dateless
    const UK_PLATE = /^[A-Z]{2}[0-9]{2}\s?[A-Z]{3}$|^[A-Z][0-9]{1,3}\s?[A-Z]{3}$|^[A-Z]{3}\s?[0-9]{1,3}[A-Z]$|^[A-Z]{3}\s?[0-9]{1,4}$|^[0-9]{1,4}\s?[A-Z]{1,3}$/;

    const video = document.getElementById('videoEl');
    const canvas = document.getElementById('canvasEl');
    const ctx = canvas.getContext('2d');
    const plateDisp = document.getElementById('plateDisplay');
    const statusTxt = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const resultStat = document.getElementById('resultStatus');
    const scanLine = document.getElementById('scanLine');
    const confirmFl = document.getElementById('confirmFlash');
    const idleOvl = document.getElementById('idleOverlay');
    const fpsLabel = document.getElementById('fpsLabel');
    const logEntries = document.getElementById('logEntries');
    const logCount = document.getElementById('logCount');

    let stream = null;
    let worker = null;
    let scanning = false;
    let scanInterval = null;
    let lastCandidate = null;
    let candidateCount = 0;
    let confirmedPlate = null;
    let loggedPlates = [];
    let scanCount = 0;
    let lastScanTime = Date.now();

    // ── Tesseract worker init ───────────────────────────────────────────────────
    async function initWorker() {
      setStatus('working', 'Loading OCR engine…');
      worker = await Tesseract.createWorker('eng', 1, {
        logger: () => { }
      });
      await worker.setParameters({
        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 ',
        tessedit_pageseg_mode: '7', // single line
      });
      setStatus('ready', 'OCR ready — camera active.');
    }

    // ── Camera ─────────────────────────────────────────────────────────────────
    async function startScanner() {
      try {
        setStatus('working', 'Requesting camera…');
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        await video.play();

        idleOvl.classList.add('hidden');
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        scanLine.classList.add('active');

        await initWorker();
        scanning = true;
        scanInterval = setInterval(runOCR, 600);

      } catch (err) {
        setStatus('error', 'Camera error: ' + err.message);
      }
    }

    function stopScanner() {
      scanning = false;
      clearInterval(scanInterval);
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (worker) { worker.terminate(); worker = null; }
      stream = null;

      idleOvl.classList.remove('hidden');
      scanLine.classList.remove('active');
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('logBtn').disabled = true;
      document.getElementById('resetBtn').disabled = true;
      fpsLabel.textContent = '—';
      setStatus('', 'Stopped.');
    }

    // ── OCR ────────────────────────────────────────────────────────────────────
    async function runOCR() {
      if (!scanning || video.readyState < 2) return;

      // Crop to centre band (35%–65% vertically, 8%–92% horizontally)
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const sx = Math.floor(vw * 0.08);
      const sy = Math.floor(vh * 0.35);
      const sw = Math.floor(vw * 0.84);
      const sh = Math.floor(vh * 0.30);

      canvas.width = sw;
      canvas.height = sh;
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

      // Enhance contrast for OCR
      // Removed these lines to see if it improves performance without significantly impacting accuracy.
      // ctx.filter = 'contrast(1.6) brightness(1.1)';
      // ctx.drawImage(canvas, 0, 0);
      // ctx.filter = 'none';

      // FPS tracking
      const now = Date.now();
      const fps = Math.round(1000 / (now - lastScanTime));
      lastScanTime = now;
      scanCount++;
      fpsLabel.textContent = fps + ' fps';

      try {
        const { data } = await worker.recognize(canvas);
        const raw = data.text.trim().toUpperCase().replace(/[^A-Z0-9 ]/g, '').trim();
        const conf = data.confidence;

        if (conf > 55 && UK_PLATE.test(raw)) {
          const clean = raw.replace(/\s/g, '');
          // Format as AB12 ABC if current-style (7 chars)
          const formatted = formatPlate(clean);
          handleCandidate(formatted, conf);
        } else {
          // Partial — show if reasonable
          if (conf > 40 && raw.length >= 3) {
            showCandidate(raw, conf);
          }
        }
      } catch (e) {
        // OCR error — silently continue
      }
    }

    function formatPlate(raw) {
      // Current UK format: AANNBBB → AA11 BBB
      if (/^[A-Z]{2}[0-9]{2}[A-Z]{3}$/.test(raw)) {
        return raw.slice(0, 4) + ' ' + raw.slice(4);
      }
      return raw;
    }

    function handleCandidate(plate, conf) {
      if (confirmedPlate) return; // Already locked

      if (plate === lastCandidate) {
        candidateCount++;
      } else {
        lastCandidate = plate;
        candidateCount = 1;
      }

      if (candidateCount >= 2) {
        confirmPlate(plate, conf);
      } else {
        showCandidate(plate, conf);
      }
    }

    function showCandidate(plate, conf) {
      plateDisp.className = 'plate-display candidate';
      plateDisp.textContent = plate;
      resultStat.className = 'result-status scanning';
      resultStat.textContent = `Candidate · ${Math.round(conf)}% confidence`;
      setStatus('working', 'Scanning — hold steady…');
    }

    function confirmPlate(plate, conf) {
      confirmedPlate = plate;
      scanning = false; // Pause scanning

      plateDisp.className = 'plate-display confirmed';
      plateDisp.textContent = plate;
      resultStat.className = 'result-status confirmed';
      resultStat.textContent = `Confirmed · ${Math.round(conf)}% confidence`;

      // Flash
      confirmFl.classList.add('show');
      setTimeout(() => confirmFl.classList.remove('show'), 400);

      scanLine.classList.remove('active');
      document.getElementById('logBtn').disabled = false;
      document.getElementById('resetBtn').disabled = false;
      setStatus('ready', `Plate confirmed: ${plate}`);
    }

    function resetResult() {
      confirmedPlate = null;
      lastCandidate = null;
      candidateCount = 0;

      plateDisp.className = 'plate-display';
      plateDisp.innerHTML = '<span class="plate-placeholder">AB12 ABC</span>';
      resultStat.className = 'result-status';
      resultStat.textContent = 'Scanning…';

      document.getElementById('logBtn').disabled = true;
      document.getElementById('resetBtn').disabled = true;
      scanLine.classList.add('active');
      scanning = true;
      setStatus('ready', 'Reset — scanning for plate…');
    }

    // ── Log ────────────────────────────────────────────────────────────────────
    function logPlate() {
      if (!confirmedPlate) return;

      const now = new Date();
      const timeStr = now.toTimeString().slice(0, 8);
      loggedPlates.unshift({ plate: confirmedPlate, time: timeStr });

      // Remove empty state
      const empty = logEntries.querySelector('.log-empty');
      if (empty) empty.remove();

      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `
      <span class="log-plate">${confirmedPlate}</span>
      <span class="log-time">${timeStr}</span>
    `;
      logEntries.prepend(entry);
      logCount.textContent = loggedPlates.length + (loggedPlates.length === 1 ? ' entry' : ' entries');

      setStatus('ready', `Logged: ${confirmedPlate}`);
      resetResult();
    }

    function clearLog() {
      loggedPlates = [];
      logEntries.innerHTML = '<div class="log-empty">No plates logged yet</div>';
      logCount.textContent = '0 entries';
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    function setStatus(type, text) {
      statusDot.className = 'status-dot' + (type ? ' ' + type : '');
      statusText.textContent = text;
    }
  </script>
</body>

</html>
